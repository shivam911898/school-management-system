services:
  - type: web
    name: school-management
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_DB
        value: true
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_EXPIRES_IN_DAYS
        value: 7
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
