<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | J.C. Memorial School</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <main class="auth-layout">
        <section class="auth-card">
            <a class="brand" href="/" style="margin-bottom: 22px; display: inline-flex;">
                <span class="brand-mark">JC</span>
                <span>J.C. Memorial School, Nagra, Ballia</span>
            </a>

            <h1 style="margin-bottom:8px;">Forgot Your Password?</h1>
            <p class="muted" style="margin-bottom:24px;">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            <!-- Recovery method toggle -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" class="button"
                    style="flex: 1; background: #667eea; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: 500;">📧
                    Email</button>
                <a href="/forgot-password-sms.html" class="button"
                    style="flex: 1; background: #f0f0f0; color: #333; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: 500;">📱
                    SMS</a>
            </div>

            <!-- Success message -->
            <div id="successMessage" class="empty-state hidden"
                style="margin-bottom: 20px; background: #ecfdf5; color: #065f46; padding: 12px; border-radius: 6px;">
                ✓ Check your email for a password reset link. It will expire in 1 hour.
            </div>

            <div id="debugLinks" class="empty-state hidden"
                style="margin-bottom: 20px; background: #eff6ff; color: #1e3a8a; padding: 12px; border-radius: 6px;">
            </div>

            <!-- Error message -->
            <div id="errorMessage" class="empty-state hidden"
                style="margin-bottom: 20px; background: #fef2f2; color: #991b1b; padding: 12px; border-radius: 6px;">
            </div>

            <!-- Forgot password form -->
            <form id="forgotForm">
                <div class="field">
                    <label for="forgotEmail">Email Address</label>
                    <input id="forgotEmail" type="email" placeholder="Enter your email address" required />
                </div>

                <button type="submit" class="button" style="width: 100%; margin-top: 16px;">Send Reset Link</button>

                <p style="text-align: center; margin-top: 16px; font-size: 0.875rem;">
                    <a href="/login" style="color: var(--primary); text-decoration: none;">Back to Login</a>
                </p>
            </form>
        </section>
    </main>

    <div id="toastWrap" class="toast-wrap"></div>

    <script src="/js/api.js"></script>
    <script>
        const forgotForm = document.getElementById('forgotForm');
        const forgotEmail = document.getElementById('forgotEmail');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const debugLinks = document.getElementById('debugLinks');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            debugLinks.classList.add('hidden');
            debugLinks.innerHTML = '';

            try {
                const response = await api.post('/api/auth/forgot-password', {
                    email: forgotEmail.value.trim(),
                });

                if (response.success) {
                    forgotForm.style.display = 'none';
                    successMessage.classList.remove('hidden');

                    if (response.debug?.resetUrl || response.debug?.emailPreviewUrl) {
                        const parts = [];
                        if (response.debug.resetUrl) {
                            parts.push(`Reset Link: <a href="${response.debug.resetUrl}" target="_blank" rel="noopener noreferrer">Open Reset Page</a>`);
                        }
                        if (response.debug.emailPreviewUrl) {
                            parts.push(`Email Preview: <a href="${response.debug.emailPreviewUrl}" target="_blank" rel="noopener noreferrer">Open Mail Preview</a>`);
                        }

                        debugLinks.innerHTML = `<strong>Debug Links (non-production):</strong><br>${parts.join('<br>')}`;
                        debugLinks.classList.remove('hidden');
                    }
                } else {
                    errorMessage.textContent = response.message || 'Failed to send reset email';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = error.message || 'Failed to send reset email';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
