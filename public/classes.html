<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Classes | J.C. Memorial School</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="/css/styles.css"/>
<style>
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.class-card{background:var(--white);border:1.5px solid var(--slate-light);border-radius:var(--r-xl);padding:22px;transition:all .18s}
.class-card:hover{border-color:var(--gold);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.class-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.class-icon{width:48px;height:48px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--navy),var(--navy-mid));display:grid;place-items:center;font-size:1.2rem;color:var(--gold-light)}
.class-name{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy)}
.class-meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.class-actions{display:flex;gap:8px}
</style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="brand"><span class="brand-mark">JC</span><span>J.C. Memorial</span></div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a class="sidebar-link" href="/dashboard"><span class="nav-icon">🏠</span>Dashboard</a>
      <a class="sidebar-link admin-only teacher-only" href="/attendance"><span class="nav-icon">✅</span>Attendance</a>
      <a class="sidebar-link" href="/students"><span class="nav-icon">🎓</span>Students</a>
      <a class="sidebar-link active admin-only teacher-only" href="/classes"><span class="nav-icon">🏫</span>Classes</a>
      <a class="sidebar-link" href="/notices"><span class="nav-icon">📢</span>Notices</a>
      <div class="sidebar-section-label admin-only teacher-only">Analytics</div>
      <a class="sidebar-link admin-only teacher-only" href="/attendance-analytics"><span class="nav-icon">📊</span>Analytics</a>
      <div class="sidebar-section-label admin-only">Administration</div>
      <a class="sidebar-link admin-only" href="/user-management"><span class="nav-icon">👥</span>Users</a>
      <a class="sidebar-link admin-only" href="/admin-dashboard"><span class="nav-icon">🛡️</span>Admin Panel</a>
      <div class="sidebar-section-label">More</div>
      <a class="sidebar-link" href="/"><span class="nav-icon">🏡</span>Public Site</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" data-admin-name>User</div>
          <div class="sidebar-user-role" id="sidebarRole">—</div>
        </div>
      </div>
    </div>
  </aside>
  <div class="content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div><div class="page-heading">Classes</div><div class="page-subheading">Manage classrooms and subjects</div></div>
      </div>
      <div class="topbar-right">
        <button id="addClassBtn" class="button btn-sm admin-only">+ New Class</button>
        <button id="logoutButton" class="button-danger btn-sm">Sign Out</button>
      </div>
    </header>
    <div class="content-inner">
      <div id="classList" class="class-grid">
        <div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🏫</div><p>Loading classes…</p></div>
      </div>
    </div>
  </div>
</div>

<!-- CLASS MODAL -->
<div class="modal-backdrop" id="classModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="classModalTitle">New Class</div>
      <button class="modal-close" onclick="document.getElementById('classModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <form id="classForm">
        <input type="hidden" id="classId"/>
        <div class="form-stack" style="display:flex;flex-direction:column;gap:16px">
          <div class="field"><label for="className">Class Name *</label><input type="text" id="className" placeholder="e.g. Class 10A" required/></div>
          <div class="field"><label for="classSection">Section</label><input type="text" id="classSection" placeholder="e.g. A"/></div>
          <div class="field"><label for="classTeacher">Class Teacher</label><select id="classTeacher"><option value="">Select Teacher</option></select></div>
          <div class="field"><label for="classSubjects">Subjects (comma separated)</label><input type="text" id="classSubjects" placeholder="Math, Science, English"/></div>
          <div class="field"><label for="classCapacity">Max Capacity</label><input type="number" id="classCapacity" placeholder="40"/></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="button-secondary" onclick="document.getElementById('classModal').classList.remove('open')">Cancel</button>
      <button class="button" id="saveClassBtn">Save Class</button>
    </div>
  </div>
</div>

<div id="toastWrap" class="toast-wrap"></div>
<script src="/js/api.js"></script>
<script src="/js/classes.js"></script>
<script>
document.getElementById('addClassBtn')?.addEventListener('click',()=>{
  document.getElementById('classModalTitle').textContent='New Class';
  document.getElementById('classId').value='';
  document.getElementById('classForm').reset();
  document.getElementById('classModal').classList.add('open');
});
</script>
</body></html>
