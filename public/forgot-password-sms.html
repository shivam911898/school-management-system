<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password via SMS - School Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 5px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }

        .method-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .method-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .method-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #0066cc;
        }

        @media (max-width: 720px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Reset Password</h1>
            <p>Enter your phone number to receive a reset link</p>
        </div>

        <div class="method-toggle">
            <button class="method-btn" onclick="switchToEmail()">Email</button>
            <button class="method-btn active" onclick="switchToSMS()">SMS</button>
        </div>

        <div id="message" class="message"></div>

        <form id="forgotPasswordForm">
            <div class="info-box">
                📱 You'll receive a text message with a password reset link
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+91 XXXXX XXXXX" required />
            </div>

            <button type="submit">Send SMS</button>
        </form>

        <div class="divider">OR</div>

        <div class="links">
            <a href="/login-role.html">Back to Login</a>
            <span>•</span>
            <a href="/forgot-password.html">Use Email Instead</a>
        </div>
    </div>

    <script>
        const form = document.getElementById("forgotPasswordForm");
        const messageDiv = document.getElementById("message");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const phone = document.getElementById("phone").value.trim();

            if (!phone) {
                showMessage("Please enter your phone number", "error");
                return;
            }

            try {
                const response = await fetch("/api/auth/forgot-password-sms", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone }),
                });

                const data = await response.json();

                if (response.ok) {
                    let msg =
                        "✓ If this phone number is associated with an account, you will receive an SMS with a password reset link.";

                    if (data?.debug?.resetUrl) {
                        msg += `<br><br><strong>Debug Reset Link:</strong> <a href="${data.debug.resetUrl}" target="_blank" rel="noopener noreferrer">Open Reset Page</a>`;
                    }

                    showMessage(msg, "success");
                    form.reset();
                    setTimeout(() => {
                        window.location.href = "/login-role.html";
                    }, 3000);
                } else {
                    showMessage(
                        data.message ||
                        "Failed to send SMS. Please try again or use email recovery.",
                        "error",
                    );
                }
            } catch (error) {
                console.error("Error:", error);
                showMessage(
                    "An error occurred. Please check your connection and try again.",
                    "error",
                );
            }
        });

        function showMessage(text, type) {
            messageDiv.innerHTML = text;
            messageDiv.className = `message ${type}`;
        }

        function switchToEmail() {
            window.location.href = "/forgot-password.html";
        }

        function switchToSMS() {
            // Already on SMS page
            return false;
        }
    </script>
</body>

</html>
